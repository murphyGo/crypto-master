# fly.toml app configuration file generated for crypto-master on 2026-04-27T02:07:44+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'crypto-master'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '2m0s'
    method = 'GET'
    path = '/_stcore/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
