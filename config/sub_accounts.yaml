# Runtime paper-lab sub-accounts.
#
# Each enabled account below isolates one strategy into its own paper balance,
# proposal policy, execution policy, and notification threshold so the dashboard
# can compare strategy outcomes side by side.

sub_accounts:
  - id: default
    name: Default Paper Account
    mode: paper
    exchange_ref: default
    enabled: false
    capital_policy:
      initial_balance: {USDT: 10000}
      sizing_balance: 10000
    strategy_policy:
      strategy_filter: null

  - id: bollinger_band_reversion
    name: Bollinger Band Reversion Lab
    mode: paper
    exchange_ref: default
    enabled: true
    capital_policy: {initial_balance: {USDT: 10000}, sizing_balance: 10000}
    strategy_policy: {strategy_filter: [bollinger_band_reversion]}
    proposal_policy: {auto_approve_threshold: 0.0, notify_min_score: 0.0}
    execution_policy: {reject_if_past_stop_loss: false, reject_if_stale_quote: false, fill_slippage_tolerance: 1.0}

